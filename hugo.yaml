  # About
  about:
    enable: true
    title: "About Me"
    image: "images/me.webp"
    content: |-
      With a degree in electrical engineering and a career built in software, I am a lifelong student of how things work. I thrive on the challenge of evolving technologies, consistently transforming abstract technical problems into elegant, user-friendly solutions.
      Whether I’m designing a user interface or powering an electrical system, my goal remains the same: engineering excellence, with a human touch.

      I am currently working as a Software Engineer at [EVS](https://evs.com/eu) where I develop and maintain software for live video productions.
    skills:
      enable: true
      title: "My areas of expertise include:"
      items:
        - "Qt (C++/QML)"
        - "C#"
        - "Python"
        - "Linux"
        - "Docker"
        - "Git"
        - "Robotics"
        - "Imaging techniques"

