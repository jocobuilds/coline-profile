baseURL: "https://joachim.coline.be/"
languageCode: "fr-be"
title: "Joachim Coline"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blog
          weight: 1
  fr:
    contentDir: "content/fr"
    languageName: "Français"
    weight: 3
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Articles de blog
          url: /fr/blog
          weight: 1
    params:
      hero:
        intro: "Bonjour, je m'appelle"
        title: "Joachim."
        subtitle: "Je transforme des idées en systèmes intégrés"
        content: "Ingénieur électricien et développeur logiciel. Animé par l'impact de mon travail, je fournis des solutions où matériel et logiciel font bon ménage."
        button:
          name: "CV"
          url: "../files/resume-coline.pdf"
      about:
        title: "À Propos de Moi"
        content: |-
          Diplômé ingénieur civil électricien et fort d'une carrière dans la conception logicielle, je m'intéresse depuis toujours au fonctionnement des choses. 
          Je me nourris des défis posés par l'évolution des technologies, en transformant des problèmes techniques abstraits en solutions pratiques et orientées utilisateur.
          Que je conçoive une interface graphique ou que je branche un système électrique, mon objectif reste le même: l'excellence technique, avec une touche humaine.

          Je travaille actuellement en tant qu'ingénieur en développement logiciel chez [EVS](https://evs.com/eu), où je développe et assure la maintenance de logiciels destinés aux productions vidéo en direct.
        skills:
          title: "Mes domaines d'expertise incluent:"
          items:
            - "Qt (C++/QML)"
            - "C#"
            - "Python"
            - "Linux"
            - "Docker"
            - "Git"
            - "Robotique"
            - "Techniques d'imagerie"
      experience:
        enable: true
        items:
          - company: "EVS"
            companyUrl: "https://evs.com/eu"
            jobs:
              - name: "Ingénieur en développement logiciel"
                date: "Mars 2025 - présent"
                content: "Développement et maintenance de logiciel pour les productions vidéo en direct."

          - company: "X-ray Imaging Solutions"
            companyUrl: "https://xris.eu"
            jobs:
              - name: "Ingénieur en développement logiciel"
                date: "Août 2020 - Mars 2025"
                content: |
                  Développement, livraison et maintenance d'extensions logicielles pour des systèmes complexes d'imagerie par rayons X et ultrasons.
                  - Ingénieur logiciel principal pour plusieurs projets.
                  - Déploiement et support sur site.
                  - Collaboration étroite avec les clients.
                  - Traitement du signal en temps réel, techniques de visualisation des données, robotique, conception d'interfaces graphiques.
              - name: "Stagiaire en ingénierie électrique"
                date: "Août 2019 - Août 2020"
                content: |
                  Étude d'un système d'imagerie par tomosynthèse.

          - company: "Université de Liège"
            companyUrl: "https://www.uliege.be"
            jobs: 
            - name: "Assistant étudiant"
              date: "Février 2018 - Mars 2019"
              content: |
                Assistant de laboratoire pour le cours d'[Électronique Numérique](https://www.programmes.uliege.be/cocoon/20252026/cours/ELEN0040-1.html).

      education:
        enable: true
        index: false
        items:
          - title: "Master ingénieur civil électricien"
            school:
              name: "Université de Liège, Belgique"
              url: "https://www.uliege.be"
            date: "2018 - 2020"
            content: |-          
              Finalité en traitement du signal et robotique intelligente. Obtenu avec grande distinction.

          - title: "Programme Erasmus • Mathématiques et Informatique"
            school:
              name: "Université de Technologie d'Eindhoven, Pays-Bas"
              url: "https://www.tue.nl/en/our-university/departments/mathematics-and-computer-science"
            date: "2019 - 2020"
            content: |-
              Immersion dans un environnement académique néerlandais.

          - title: "Bachelier ingénieur civil"
            school:
              name: "Université de Liège, Belgique"
              url: "https://www.uliege.be"
            date: "2015 - 2018"
            content: |-
              Fondamentaux de l'ingénierie, y compris cours de mathématiques, d'électricité et de mécanique.
          - title: "Programme d'échange"
            school: 
              name: "Bolton High School, Alexandria, LA, USA"
              url: "https://www.wep.be"
            date: "2014 - 2015"
            content: |-
              Une année de lycée aux États-Unis dans le cadre d'un programme d'échange.

      achievements:
        enable: true
        items:
          - title: Prix AIM de la meilleure thèse de master en ingénieur électricien, promotion 2020
            content: L'AIM a créé plusieurs prix afin d'encourager la recherche scientifique et de promouvoir les travaux originaux. Chaque année, l'AIM récompense les meilleurs mémoires de master rédigés par les diplômés de l'Institut Montefiore (Université de Liège, Belgique).
          - title: Prix du meilleur pitch au Hackathon EVS 2026
            content: Décerné pour la meilleure présentation d'une idée de projet lors du Hackathon EVS 2026, un événement interne où les équipes s'affrontent pour développer des solutions innovantes dans un délai limité.
      
      projects:
        title: "Projets"
        enable: true
        items:
          - title:  Opérations distantes pour les besoins du direct
            content: Une solution logicielle permettant aux opérateurs de travailler à distance lors de productions vidéo en direct.
            image: images/projects/live.webp
            badges:
              - "Professionnel"
            links:
              - icon: fas fa-link
                url: https://www.evs.com
          - title:  Intégration d'imagerie par ultrasons dans un logiciel de rayons X
            content: Une solution logicielle pour l'analyse de données d'appareils de mesure par rayons X et par ultrasons pour le contrôle non destructif.
            image: images/projects/xrut.webp
            badges:
              - "Professionnel"
            links:
              - icon: fas fa-link
                url: https://www.xris.eu
          - title:  Robot auto-équilibré
            content: Conception, programmation et assemblage d'un robot capable de maintenir son équilibre de manière autonome.
            image: images/projects/robot.webp
            badges:
              - "Académique"
            links:
              - icon: fas fa-link
                url: https://www.am.uliege.be/cms/c_4219258/fr/presentations-des-projets-des-etudiants-de-master
          - title:  Panneau de LEDs interactif pour les spectacles de théâtre improvisé
            content: Un grand tableau de LEDs adressables individuellement et contrôlé par un microcontrôleur pour afficher divers motifs et animations.
            image: images/projects/ledpanel.webp
            badges:
              - "Personnel"
            links:
              - icon: fab fa-github
                url: https://github.com/jocobuilds/easy-led-panel
          - title:  Tableau de bord mural
            content: Un tableau de bord mural encadré dans un boîtier imprimé en 3D qui affiche l'heure, la météo et les événements du calendrier.
            image: images/projects/dashboard.webp
            badges:
              - "Personnel"
            links:
              - icon: fab fa-github
                url: https://github.com/jocobuilds/home-google-calendar-dashboard
          - title:  Mini bras robotique industriel
            content: Assemblage et contrôle d'un bras robotique polyvalent imprimé en 3D.
            image: images/projects/arm.webp
            badges:
              - "Personnel"
            links:
              - icon: fab fa-github
                url: https://github.com/PCrnjak/PAROL6-Desktop-robot-arm
      footer:
        recentPosts:
          path: "blog"
          count: 3
          title: Articles Récents
          enable: true
          disableFeaturedImage: false
        socialNetworks:
          github: https://github.com/jocobuilds
          linkedin: https://www.linkedin.com/in/joachim-coline
      
      contact:
        content: Ma boîte de réception est toujours ouverte. Que vous ayez une question, un besoin ou que vous vouliez simplement dire bonjour, je ferai de mon mieux pour vous répondre!
        btnName: Écrivez-moi

      singlePages:
        readTime:
          content: "min de lecture"

      terms:
        read: "Lire"
        toc: "Table des matières"
        copyright: "Tous droits réservés"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: gallery
      name: Gallery
      title: Gallery
      url: /gallery
      weight: 2

params:
  title: "Joachim Coline"
